<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>n8n Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <button class="hamburger" aria-label="Menú">☰</button>
  <h1>n8n Dashboard</h1>
  <span class="badge">BETA</span>
</header>

<div class="status-bar">
  <span class="dot red" id="n8n-dot"></span>
  <span id="n8n-status">Comprobando n8n...</span>
</div>

<div class="main">
  <div class="drawer-overlay" id="drawer-overlay"></div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Webhooks</h2>
      <button class="sidebar-close">✕</button>
    </div>
    <div id="webhook-list">
      <div class="empty-state" style="margin-top:8px;font-size:0.8rem;">Sin webhooks.<br>Añade uno abajo.</div>
    </div>
    <button class="add-webhook">+ Añadir webhook</button>
  </div>

  <div class="chat-panel">
    <div class="active-bar" id="active-bar">
      <span>Hablando con: <strong id="active-name">—</strong></span>
    </div>
    <div class="messages" id="messages">
      <div class="empty-state">Abre el menú ☰ y selecciona<br>un webhook para empezar.</div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="msg-input" placeholder="Escribe un mensaje..." rows="1"></textarea>
        <button class="send" id="send-btn">➤</button>
      </div>
      <div class="hint">Enter para enviar · Shift+Enter para nueva línea</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Añadir Webhook</h3>
    <div>
      <label>Nombre</label>
      <input id="m-name" type="text" placeholder="Mi flujo" autocomplete="off">
    </div>
    <div>
      <label>Path (ej: /webhook/chat)</label>
      <input id="m-path" type="text" placeholder="/webhook/chat" autocomplete="off" autocapitalize="none">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel">Cancelar</button>
      <button class="btn-save">Guardar</button>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
