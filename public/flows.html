<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Flows — n8n Dashboard</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .flows-page {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .flows-page-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    .flows-page-header h2 { font-size: 1.1rem; font-weight: 600; color: #fff; }
    .flows-count { font-size: 0.78rem; color: #555; }
    .flows-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
    }
    @media (max-width: 600px) {
      .flows-page { padding: 16px; }
      .flows-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-logo">n8n</span>
      <h1>Dashboard</h1>
      <span class="badge">BETA 2</span>
    </div>
    <ul class="nav-links">
      <li><a href="/" class="nav-link">Chat</a></li>
      <li><a href="/flows" class="nav-link active">Flows</a></li>
    </ul>
  </nav>
</header>

<div class="flows-page">
  <div class="flows-page-header">
    <h2>Flows disponibles</h2>
    <span class="flows-count" id="flows-count"></span>
  </div>
  <div class="flows-grid" id="flows-grid"></div>
</div>

<script type="module" src="js/flows-page.js"></script>
</body>
</html>
